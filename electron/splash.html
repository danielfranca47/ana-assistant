<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F8F6F1;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }
    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #2C5F4A;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #fff;
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    .text {
      color: #5a7a6a;
      font-size: 13px;
      margin-bottom: 28px;
      letter-spacing: 0.02em;
    }
    .dots::after {
      content: '';
      animation: dots 1.5s steps(1) infinite;
    }
    @keyframes dots {
      0%   { content: '';    }
      33%  { content: '.';   }
      66%  { content: '..';  }
      100% { content: '...'; }
    }
    .track {
      width: 180px;
      height: 2px;
      background: #e0dbd3;
      border-radius: 1px;
      overflow: hidden;
    }
    .bar {
      height: 100%;
      background: #2C5F4A;
      border-radius: 1px;
      animation: prog 2.5s ease-in-out infinite;
    }
    @keyframes prog {
      0%   { width: 0%;  }
      70%  { width: 85%; }
      100% { width: 85%; }
    }
  </style>
</head>
<body>
  <div class="avatar">A</div>
  <p class="text">A carregar a Ana<span class="dots"></span></p>
  <div class="track">
    <div class="bar"></div>
  </div>
</body>
</html>
